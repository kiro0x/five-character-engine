name: Test

on:
  push:
  pull_request:

jobs:
  offline-harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile harness modules
        run: python -m compileall -q harness
      - name: Run offline verify-loop tests
        run: python harness/test_verify_loop.py
